<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato — Coneito</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="topo">
    <div class="container py-4">
      <h1 class="m-0">Entre em contato com a gente </h1>
      <p class="m-0">De cliente para a Conceito</p>
    </div>
  </header>

  <nav class="navbar navbar-expand-lg navbar-dark menu-principal">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">CONTRATE:</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavegacao" aria-controls="menuNavegacao" aria-expanded="false" aria-label="Alternar navegação">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menuNavegacao">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link active" href="contato.html">Contato</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <section class="row justify-content-center">
      <div class="col-lg-8">
        <h2 class="titulo-secao mb-4">Formulário de contato</h2>

        <form class="card-form p-4 p-md-5">
          <div class="mb-3">
            <label for="nome" class="form-label">Nome completo</label>
            <input type="text" class="form-control" id="nome" placeholder="Digite seu nome completo">
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com">
          </div>

          <div class="mb-3">
            <label for="telefone" class="form-label">Telefone / WhatsApp</label>
            <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000">
          </div>

          <div class="mb-3">
            <label for="assunto" class="form-label">Assunto</label>
            <select class="form-select" id="assunto">
              <option selected>Selecione uma opção</option>
              <option value="pedido">Agendar visita de um profissional</option>
              <option value="elogio">Sobre um serviço ja entregue</option>
              <option value="sugestao">Sugestão</option>
              <option value="reclamacao">Ajuda</option>
              <option value="outros">Outros</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="mensagem" class="form-label"></label>
            <textarea class="form-control" id="mensagem" rows="5" placeholder="Escreva sua mensagem aqui..."></textarea>
          </div>

          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" value="" id="confirmacao">
            <label class="form-check-label" for="confirmacao">
              Concordo em receber novidades e promoções por e-mail.
            </label>
          </div>

          <button type="submit" class="btn btn-rosa btn-lg w-100">Enviar Formulario</button>
        </form>

        <div class="mt-4 text-center info-contato">
          <p>📍 Avenida Major Gote 393—Centro</p>
          <p>📞 (34) 9670-5539</p>
          <p>🕐 Seg a Sex: 7h às 19h | Sáb: 7h às 12h</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="rodape">
    <div class="container py-4 text-center">
      <i class="bi bi-geo"></i>
      <p class="m-0">Vidraçaria conceito-o conceito feito pra voce</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
